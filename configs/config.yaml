# Marstaff Configuration

server:
  host: "0.0.0.0"
  port: 15678
  mode: "debug"
  read_timeout: 60
  write_timeout: 60

database:
  driver: "mysql"
  host: "localhost"
  port: 3306
  database: "marstaff"
  username: "root"
  password: ""
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: 300

provider:
  default: "zai"
  zai:
    api_key: "${ZHIPU_API_KEY}"
    base_url: "https://api.z.ai/api/paas/v4"
    model: "glm-4-flash"
    vision_model: "glm-4v-plus"  # 当消息含图片时使用视觉模型
  qwen:
    api_key: "${QWEN_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com"
    model: "qwen-max"
    vision_model: "qwen-vl-max"  # 当消息含图片时自动使用视觉模型
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimax.chat/v1"
    model: "abab6.5s-chat"
    group_id: "${MINIMAX_GROUP_ID}"  # 中国版可选
  minimax_intl:
    api_key: "${MINIMAX_API_KEY}"
    # base_url 默认 https://api.minimaxi.com/v1 国际版
    model: "abab6.5s-chat"
  gemini:
    api_key: "${GEMINI_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    model: "gemini-2.0-flash-exp"
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4"
  zhipu:
    api_key: "${ZHIPU_API_KEY}"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-flash"
  ollama:
    base_url: "http://localhost:11434/v1"
    model: "llama3.2"
    # api_key optional (Ollama does not validate, use "ollama" as placeholder)
  vllm:
    base_url: "http://localhost:8000/v1"
    model: "meta-llama/Llama-2-7b-chat-hf"
    # api_key optional (vLLM typically does not validate)
  poe:
    api_key: "${POE_API_KEY}"
    base_url: "https://api.poe.com/v1"
    model: "Claude-Sonnet-4"
    # 通过 Poe 访问 Claude，API Key 从 https://poe.com/api/keys 获取
  fallback:
    - "qwen"

# Media generation configuration (images and videos)
media:
  default: "wanxiang_2.6"
  wanxiang_2_6:
    api_key: "${QWEN_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com"

# Aliyun OSS configuration for image upload
oss:
  access_key_id: "${ALIYUN_ACCESS_KEY_ID}"
  access_key_secret: "${ALIYUN_ACCESS_KEY_SECRET}"
  bucket: "phimhoa"
  endpoint: "oss-accelerate.aliyuncs.com"
  domain: "https://phimhoa.oss-accelerate.aliyuncs.com"
  path_prefix: "uploads/"

adapters:
  - type: "telegram"
    enabled: true
    config:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
  - type: "matrix"
    enabled: false
    config:
      homeserver: "https://matrix.org"
      bot_username: "${MATRIX_BOT_USERNAME}"
      bot_password: "${MATRIX_BOT_PASSWORD}"
  - type: "discord"
    enabled: false
    config:
      bot_token: "${DISCORD_BOT_TOKEN}"
  - type: "slack"
    enabled: false
    config:
      bot_token: "${SLACK_BOT_TOKEN}"
  - type: "websocket"
    enabled: true
    config:
      path: "/ws"

# Workspace for programming mode (new project creation)
workspace:
  base_path: "./workspace/projects"

# AFK/Idle Mode Configuration
afk:
  enabled: true
  scheduler_interval: 60s  # How often to check for pending tasks

skills:
  path: "./skills"
  auto_load: true
  # registry_url: ""  # Optional: remote skill discovery. Builtin registry (calculator, weather) is always available.
  # ClawHub-compatible: use JSON API returning {"skills": [...]} with id, name, description, install_url (or tagline/homepage)

# Security: sandbox for non-main sessions (e.g. group/channel sessions)
security:
  sandbox:
    mode: "off"   # "off" | "non_main" (run non-main sessions in Docker sandbox)
    image: "alpine:latest"  # Docker image for sandbox (requires Docker)

log:
  level: "debug"   # 排查时用 debug，生产用 info
  format: "console"
  output: "stdout"
