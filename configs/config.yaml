# Marstaff Configuration

server:
  host: "0.0.0.0"
  port: 18789
  mode: "debug"
  read_timeout: 60
  write_timeout: 60

database:
  driver: "mysql"
  host: "localhost"
  port: 3306
  database: "marstaff"
  username: "root"
  password: ""
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: 300

provider:
  default: "zai"
  zai:
    api_key: "${ZHIPU_API_KEY}"
    base_url: "https://api.z.ai/api/paas/v4"
    model: "glm-5"
    vision_model: "glm-4v-plus"  # 当消息含图片时使用视觉模型
  qwen:
    api_key: "${QWEN_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com"
    model: "qwen-max"
    vision_model: "qwen-vl-max"  # 当消息含图片时自动使用视觉模型
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimax.chat/v1"
    model: "abab6.5s-chat"
    group_id: "${MINIMAX_GROUP_ID}"  # Optional
  gemini:
    api_key: "${GEMINI_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    model: "gemini-2.0-flash-exp"
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4"
  zhipu:
    api_key: "${ZHIPU_API_KEY}"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-5"
  fallback:
    - "qwen"

# Media generation configuration (images and videos)
media:
  default: "qwen_wanxiang"
  qwen_wanxiang:
    api_key: "${QWEN_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com"

# Aliyun OSS configuration for image upload
oss:
  access_key_id: "${ALIYUN_ACCESS_KEY_ID}"
  access_key_secret: "${ALIYUN_ACCESS_KEY_SECRET}"
  bucket: "phimhoa"
  endpoint: "oss-accelerate.aliyuncs.com"
  domain: "https://phimhoa.oss-accelerate.aliyuncs.com"
  path_prefix: "uploads/"

adapters:
  - type: "telegram"
    enabled: true
    config:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
  - type: "matrix"
    enabled: false
    config:
      homeserver: "https://matrix.org"
      bot_username: "${MATRIX_BOT_USERNAME}"
      bot_password: "${MATRIX_BOT_PASSWORD}"
  - type: "websocket"
    enabled: true
    config:
      path: "/ws"

# Workspace for programming mode (new project creation)
workspace:
  base_path: "./workspace/projects"

skills:
  path: "./skills"
  auto_load: true

log:
  level: "debug"   # 排查时用 debug，生产用 info
  format: "console"
  output: "stdout"
