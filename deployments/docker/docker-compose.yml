version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: marstaff-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: marstaff
      MYSQL_USER: marstaff
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./../../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: marstaff-gateway
    ports:
      - "18789:18789"
    environment:
      - MARSTAFF_DATABASE_HOST=mysql
      - MARSTAFF_DATABASE_PORT=3306
      - MARSTAFF_DATABASE_NAME=marstaff
      - MARSTAFF_DATABASE_USER=marstaff
      - MARSTAFF_DATABASE_PASSWORD=password
      - ZAI_API_KEY=${ZAI_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy
    command: /app/gateway --config /app/configs/config.yaml
    restart: unless-stopped

volumes:
  mysql-data:
