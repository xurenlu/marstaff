<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marstaff - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2a2a2a;
            padding: 1rem 2rem;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
        }

        .status-dot.disconnected {
            background: #f44336;
        }

        .status-dot.connecting {
            background: #ff9800;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: #2a2a2a;
            border-right: 1px solid #3a3a3a;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #3a3a3a;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem;
            background: #3a3a3a;
            border: none;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #4a4a4a;
        }

        .sessions {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .session-item {
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .session-item:hover {
            background: #3a3a3a;
        }

        .session-item.active {
            background: #4a4a4a;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
        }

        .message.user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message-content {
            background: #2a2a2a;
            padding: 1rem;
            border-radius: 12px;
            max-width: 100%;
            overflow-wrap: break-word;
        }

        .message.assistant .message-content {
            background: #3a3a3a;
        }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid #3a3a3a;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }

        .input-box {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 1rem;
            color: #e0e0e0;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        .input-box:focus {
            border-color: #4a4a4a;
        }

        .send-btn {
            padding: 0 1.5rem;
            background: #4caf50;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #45a049;
        }

        .send-btn:disabled {
            background: #3a3a3a;
            cursor: not-allowed;
        }

        .typing {
            padding: 0 2rem;
            font-size: 0.9rem;
            color: #888;
        }

        .typing:empty {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Marstaff AI Assistant</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="sessions" id="sessions">
                <div class="session-item active">New Conversation</div>
            </div>
        </div>

        <div class="chat">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Hello! I'm Marstaff, your AI assistant. How can I help you today?
                    </div>
                </div>
            </div>
            <div class="typing" id="typing"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-box" id="inputBox" placeholder="Type your message..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${window.location.hostname}:18789/ws`;
        let ws = null;
        let sessionId = null;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const messagesContainer = document.getElementById('messages');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing');

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Connected';
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Disconnected';
                setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                statusDot.className = 'status-dot connecting';
                statusText.textContent = 'Connecting...';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'chat':
                    addMessage('assistant', data.data.content);
                    break;
                case 'typing':
                    typingIndicator.textContent = data.data.typing ? 'AI is typing...' : '';
                    break;
            }
        }

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const content = inputBox.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage('user', content);
            inputBox.value = '';

            ws.send(JSON.stringify({
                type: 'chat',
                content: content,
                session_id: sessionId
            }));
        }

        sendBtn.addEventListener('click', sendMessage);
        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        inputBox.addEventListener('input', () => {
            inputBox.style.height = 'auto';
            inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
        });

        // Connect on load
        connect();
    </script>
</body>
</html>
