<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marstaff - AI Assistant</title>
    <!-- Markdown parsing -->
    <script src="https://cdnproxy.some.im/cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX for math formulas -->
    <link rel="stylesheet" href="https://cdnproxy.some.im/cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnproxy.some.im/cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdnproxy.some.im/cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- Mermaid for diagrams -->
    <script src="https://cdnproxy.some.im/cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <!-- Highlight.js for code syntax -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dark theme (default) */
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --bg-tertiary: #3a3a3a;
            --bg-hover: #4a4a4a;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #3a3a3a;
            --input-bg: #2a2a2a;
            --message-user: #2a2a2a;
            --message-assistant: #3a3a3a;
            --message-error: #3a1a1a;
            --error-color: #f44336;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --scrollbar-track: transparent;
            --scrollbar-thumb: #3a3a3a;
        }

        [data-theme="light"] {
            /* Light theme */
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --bg-hover: #f0f0f0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --border-color: #e0e0e0;
            --input-bg: #ffffff;
            --message-user: #4caf50;
            --message-assistant: #ffffff;
            --message-error: #ffebee;
            --scrollbar-track: #f1f1f1;
            --scrollbar-thumb: #c1c1c1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s, border-color 0.3s;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
        }

        .status-dot.disconnected {
            background: var(--error-color);
        }

        .status-dot.connecting {
            background: var(--warning-color);
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
        }

        .sessions {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .session-item {
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            background: var(--bg-tertiary);
        }

        .session-item.active {
            background: var(--bg-hover);
        }

        .session-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--error-color);
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .session-item:hover .session-delete {
            opacity: 1;
        }

        .session-delete:hover {
            opacity: 0.8;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            width: 100%;
        }

        .message.user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message-wrapper {
            flex: 1;
            max-width: 100%;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .message-role {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .regenerate-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .regenerate-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .regenerate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-content {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 12px;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
            transition: background 0.3s;
        }

        .message.assistant .message-content {
            background: var(--message-assistant);
            border: 1px solid var(--border-color);
        }

        .message.user .message-content {
            background: var(--message-user);
            color: white;
        }

        .message.error .message-content {
            background: var(--message-error);
            border: 1px solid var(--error-color);
        }

        /* Markdown styles */
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .message-content h1:first-child, .message-content h2:first-child,
        .message-content h3:first-child {
            margin-top: 0;
        }

        .message-content p {
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin-left: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .message-content li {
            margin-bottom: 0.25rem;
        }

        .message-content a {
            color: #4a9eff;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: var(--text-secondary);
        }

        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75rem 0;
        }

        .message-content th, .message-content td {
            border: 1px solid var(--border-color);
            padding: 0.5rem;
        }

        .message-content th {
            background: var(--bg-tertiary);
        }

        .message-content code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }

        .message-content :not(pre) > code {
            background: var(--bg-tertiary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .message-content pre {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .message-content pre code {
            background: transparent;
            padding: 0;
        }

        .message-content .katex-display {
            margin: 1rem 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .message-content .katex {
            font-size: 1.05em;
        }

        .message-content .mermaid {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 1rem;
            margin: 0.75rem 0;
            text-align: center;
        }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-color);
            transition: border-color 0.3s;
        }

        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem 0;
            min-height: 0;
        }

        .image-preview img {
            max-height: 80px;
            max-width: 120px;
            border-radius: 6px;
            object-fit: contain;
            border: 1px solid var(--border-color);
        }

        .message-content img.message-image {
            max-height: 200px;
            max-width: 100%;
            border-radius: 8px;
            margin-top: 0.5rem;
            display: block;
            object-fit: contain;
        }

        .image-preview-item {
            position: relative;
        }

        .image-preview-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.1rem 0.3rem;
        }

        .attach-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0.6rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .attach-btn:hover {
            background: var(--bg-hover);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .input-box {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 150px;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .input-box:focus {
            border-color: var(--bg-hover);
        }

        .input-box::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 0.6rem 2rem;
            background: var(--success-color);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .send-btn:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .typing {
            padding: 0 2rem 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .typing:empty {
            display: none;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing-bounce 1.4s ease-in-out infinite both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing-bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Scrollbar styles */
        .sessions::-webkit-scrollbar,
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .sessions::-webkit-scrollbar-track,
        .messages::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        .sessions::-webkit-scrollbar-thumb,
        .messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .loading-sessions {
            padding: 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Marstaff AI Assistant</h1>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                <span id="themeIcon">🌙</span>
                <span id="themeText">Dark</span>
            </button>
            <div class="status">
                <div class="status-dot connecting" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="sessions" id="sessions">
                <div class="loading-sessions">Loading sessions...</div>
            </div>
        </div>

        <div class="chat">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-wrapper">
                        <div class="message-content">
                            Hello! I'm Marstaff, your AI assistant. How can I help you today?
                        </div>
                    </div>
                </div>
            </div>
            <div class="typing" id="typing"></div>
            <div class="input-area">
                <div class="image-preview" id="imagePreview"></div>
                <div class="input-wrapper">
                    <input type="file" id="imageInput" accept="image/*" style="display:none">
                    <button class="attach-btn" id="attachBtn" title="Attach screenshot">📷</button>
                    <textarea class="input-box" id="inputBox" placeholder="Type your message... (Ctrl+V to paste screenshot)" rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const WS_URL = `ws://${window.location.hostname}:18789/ws`;
        let ws = null;
        let sessionId = null;
        let userId = null;
        let sessions = [];
        let pendingImages = [];  // base64 data URLs for screenshot input
        let lastUserMessage = null;  // Store last user message for regeneration
        let lastContentParts = null;  // Store last content parts for regeneration

        // Configure marked for better markdown rendering
        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose'
        });

        // Theme management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // Load saved theme or default to dark
        let currentTheme = localStorage.getItem('marstaff_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeUI();

        themeToggle.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('marstaff_theme', currentTheme);
            updateThemeUI();
            // Update mermaid theme based on current theme
            mermaid.initialize({
                startOnLoad: false,
                theme: currentTheme === 'dark' ? 'dark' : 'default',
                securityLevel: 'loose'
            });
        });

        function updateThemeUI() {
            if (currentTheme === 'dark') {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Dark';
            } else {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Light';
            }
        }

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const messagesContainer = document.getElementById('messages');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing');
        const sessionsContainer = document.getElementById('sessions');

        // Initialize
        init();

        async function init() {
            // Generate/get user ID
            userId = localStorage.getItem('marstaff_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('marstaff_user_id', userId);
            }

            // Connect to WebSocket
            connect();

            // Load sessions
            await loadSessions();
        }

        async function loadSessions() {
            try {
                const response = await fetch(`${API_BASE}/api/sessions?user_id=${userId}&platform=web`);
                if (!response.ok) {
                    let errMsg = 'Failed to load sessions (API ' + response.status + ')';
                    try {
                        const errData = await response.json();
                        if (errData.error) errMsg = errData.error;
                    } catch (_) {}
                    console.error('Sessions API error:', response.status, errMsg);
                    sessionsContainer.innerHTML = '<div class="loading-sessions">' + escapeHtml(errMsg) + '</div>';
                    return;
                }
                const data = await response.json();
                sessions = data.sessions || [];
                renderSessions();
            } catch (error) {
                console.error('Failed to load sessions:', error);
                sessionsContainer.innerHTML = '<div class="loading-sessions">Failed to load sessions</div>';
            }
        }

        function renderSessions() {
            if (sessions.length === 0) {
                sessionsContainer.innerHTML = '<div class="loading-sessions">No conversations yet</div>';
                return;
            }

            sessionsContainer.innerHTML = sessions.map(session => `
                <div class="session-item ${session.id === sessionId ? 'active' : ''}" data-id="${session.id}">
                    <span class="session-title">${escapeHtml(session.title || 'Untitled')}</span>
                    <button class="session-delete" onclick="deleteSession(event, '${session.id}')">×</button>
                </div>
            `).join('');

            // Add click listeners
            document.querySelectorAll('.session-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('session-delete')) {
                        loadSession(item.dataset.id);
                    }
                });
            });
        }

        async function loadSession(id) {
            sessionId = id;
            renderSessions();

            try {
                const response = await fetch(`${API_BASE}/api/sessions/${id}`);
                const data = await response.json();

                // Clear and load messages
                messagesContainer.innerHTML = '';

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const role = msg.role === 'user' ? 'user' : 'assistant';
                        const imageUrls = (msg.content_parts || [])
                            .filter(p => p.type === 'image_url' && p.image_url && p.image_url.url)
                            .map(p => p.image_url.url);
                        addMessage(role, msg.content, false, imageUrls);
                    });
                } else {
                    // Show welcome message for empty sessions
                    messagesContainer.innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">🤖</div>
                            <div class="message-wrapper">
                                <div class="message-content">
                                    Hello! I'm Marstaff, your AI assistant. How can I help you today?
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load session:', error);
            }
        }

        async function deleteSession(event, id) {
            event.stopPropagation();

            if (!confirm('Delete this conversation?')) return;

            try {
                await fetch(`${API_BASE}/api/sessions/${id}`, { method: 'DELETE' });
                sessions = sessions.filter(s => s.id !== id);

                if (sessionId === id) {
                    sessionId = null;
                    messagesContainer.innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">🤖</div>
                            <div class="message-wrapper">
                                <div class="message-content">
                                    Hello! I'm Marstaff, your AI assistant. How can I help you today?
                                </div>
                            </div>
                        </div>
                    `;
                }

                renderSessions();
            } catch (error) {
                console.error('Failed to delete session:', error);
            }
        }

        function connect() {
            ws = new WebSocket(WS_URL + '?user_id=' + userId);

            ws.onopen = () => {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Connected';
                sendBtn.disabled = false;
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Disconnected';
                sendBtn.disabled = true;
                setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                statusDot.className = 'status-dot connecting';
                statusText.textContent = 'Connecting...';
                sendBtn.disabled = true;
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function showTypingIndicator(message) {
            const text = message || 'AI is thinking...';
            typingIndicator.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span><span>' + escapeHtml(text) + '</span>';
            typingIndicator.style.display = 'flex';
        }

        function hideTypingIndicator() {
            typingIndicator.innerHTML = '';
            typingIndicator.style.display = '';
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'chat':
                    const content = data.data && data.data.content;
                    addMessage('assistant', (content && content.trim()) ? content : '（暂无回复，请稍后重试或检查 Agent 服务是否运行）');
                    hideTypingIndicator();
                    break;
                case 'typing':
                    if (data.data && data.data.typing) {
                        showTypingIndicator();
                    } else {
                        hideTypingIndicator();
                    }
                    break;
                case 'error':
                    if (data.data && data.data.error) {
                        addMessage('error', `Error: ${data.data.error}`);
                    }
                    hideTypingIndicator();
                    break;
                case 'status':
                    if (data.data && data.data.client_id) {
                        console.log('Connected as:', data.data.client_id);
                    }
                    break;
                case 'open_search':
                    if (data.data && data.data.url) {
                        // Open Google search in a new tab
                        window.open(data.data.url, '_blank');
                    }
                    break;
            }
        }

        function addMessage(role, content, scroll = true, imageUrls = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            let innerHTML = `<div class="message-avatar">${getAvatar(role)}</div>`;
            innerHTML += `<div class="message-wrapper">`;

            // Add header with regenerate button for assistant messages
            if (role === 'assistant') {
                innerHTML += `
                    <div class="message-header">
                        <span class="message-role">Assistant</span>
                        <button class="regenerate-btn" onclick="regenerateResponse()" title="Regenerate response">🔄</button>
                    </div>
                `;
            }

            let contentHtml = formatMessage(content || '');
            if (imageUrls && imageUrls.length > 0) {
                contentHtml += imageUrls.map(url => `<img src="${escapeHtml(url)}" class="message-image" alt="attached">`).join('');
            }

            innerHTML += `<div class="message-content">${contentHtml}</div>`;
            innerHTML += `</div>`;

            msgDiv.innerHTML = innerHTML;
            messagesContainer.appendChild(msgDiv);

            // Render math and mermaid diagrams
            renderMathAndDiagrams(msgDiv);

            if (scroll) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        function renderMathAndDiagrams(element) {
            // Render LaTeX math with KaTeX
            renderMathInElement(element, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });

            // Render Mermaid diagrams
            const mermaidDivs = element.querySelectorAll('.mermaid');
            mermaidDivs.forEach(div => {
                mermaid.run({
                    nodes: [div]
                }).catch(err => console.warn('Mermaid render error:', err));
            });
        }

        function getAvatar(role) {
            switch (role) {
                case 'user': return '👤';
                case 'assistant': return '🤖';
                case 'error': return '⚠️';
                default: return '💬';
            }
        }

        function formatMessage(text) {
            // Parse markdown with marked
            try {
                return marked.parse(text);
            } catch (e) {
                console.error('Markdown parse error:', e);
                // Fallback to basic formatting
                const div = document.createElement('div');
                div.textContent = text;
                let html = div.innerHTML;
                html = html.replace(/\n/g, '<br>');
                return html;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const content = inputBox.value.trim();
            if ((!content && pendingImages.length === 0) || !ws || ws.readyState !== WebSocket.OPEN) return;

            const displayContent = content || '(Image attached)';
            const imagesToShow = [...pendingImages];

            // Store for regeneration
            lastUserMessage = content;
            lastContentParts = pendingImages.length > 0 ? [
                ...(content ? [{ type: 'text', text: content }] : []),
                ...pendingImages.map(url => ({ type: 'image_url', image_url: { url: url } }))
            ] : null;

            addMessage('user', displayContent, true, imagesToShow);
            inputBox.value = '';
            inputBox.style.height = 'auto';

            const data = { content: content || '' };
            if (pendingImages.length > 0) {
                data.content_parts = [
                    ...(content ? [{ type: 'text', text: content }] : []),
                    ...pendingImages.map(url => ({ type: 'image_url', image_url: { url: url } }))
                ];
            }

            const message = {
                type: 'chat',
                user_id: userId,
                data: data
            };

            if (sessionId) {
                message.session_id = sessionId;
            }

            ws.send(JSON.stringify(message));
            pendingImages = [];
            renderImagePreview();

            // 立即显示等待反馈，给用户一点安慰
            showTypingIndicator();

            // Wait longer for session to be created and saved
            setTimeout(() => loadSessions(), 1500);
        }

        function regenerateResponse() {
            if (!ws || ws.readyState !== WebSocket.OPEN || !lastUserMessage) return;

            // Disable regenerate button
            const regenBtns = document.querySelectorAll('.regenerate-btn');
            regenBtns.forEach(btn => btn.disabled = true);

            showTypingIndicator('Regenerating...');

            const data = { content: lastUserMessage || '' };
            if (lastContentParts) {
                data.content_parts = lastContentParts;
            }

            const message = {
                type: 'chat',
                user_id: userId,
                data: data
            };

            if (sessionId) {
                message.session_id = sessionId;
            }

            ws.send(JSON.stringify(message));

            // Re-enable buttons after a delay
            setTimeout(() => {
                regenBtns.forEach(btn => btn.disabled = false);
            }, 3000);
        }
        window.regenerateResponse = regenerateResponse;

        function renderImagePreview() {
            const el = document.getElementById('imagePreview');
            el.innerHTML = pendingImages.map((url, i) => `
                <div class="image-preview-item">
                    <img src="${url}" alt="preview">
                    <button class="image-preview-remove" onclick="removePendingImage(${i})">×</button>
                </div>
            `).join('');
        }

        function removePendingImage(index) {
            pendingImages.splice(index, 1);
            renderImagePreview();
        }
        window.removePendingImage = removePendingImage;

        function addPendingImage(dataUrl) {
            if (pendingImages.length < 4) {
                pendingImages.push(dataUrl);
                renderImagePreview();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        document.getElementById('attachBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const r = new FileReader();
                r.onload = () => addPendingImage(r.result);
                r.readAsDataURL(file);
            }
            e.target.value = '';
        });
        inputBox.addEventListener('paste', (e) => {
            const item = e.clipboardData && e.clipboardData.items && [...e.clipboardData.items].find(x => x.type.startsWith('image/'));
            if (item) {
                e.preventDefault();
                const blob = item.getAsFile();
                const r = new FileReader();
                r.onload = () => addPendingImage(r.result);
                r.readAsDataURL(blob);
            }
        });

        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        inputBox.addEventListener('input', () => {
            inputBox.style.height = 'auto';
            inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
        });

        // New chat button
        document.getElementById('newChatBtn').addEventListener('click', () => {
            sessionId = null;
            lastUserMessage = null;
            lastContentParts = null;
            renderSessions();
            messagesContainer.innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-wrapper">
                        <div class="message-content">
                            Hello! I'm Marstaff, your AI assistant. How can I help you today?
                        </div>
                    </div>
                </div>
            `;
        });

        // Make deleteSession global
        window.deleteSession = deleteSession;
    </script>
</body>
</html>
