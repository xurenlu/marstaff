<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marstaff - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2a2a2a;
            padding: 1rem 2rem;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
        }

        .status-dot.disconnected {
            background: #f44336;
        }

        .status-dot.connecting {
            background: #ff9800;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #2a2a2a;
            border-right: 1px solid #3a3a3a;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #3a3a3a;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem;
            background: #3a3a3a;
            border: none;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #4a4a4a;
        }

        .sessions {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .session-item {
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            background: #3a3a3a;
        }

        .session-item.active {
            background: #4a4a4a;
        }

        .session-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .session-item:hover .session-delete {
            opacity: 1;
        }

        .session-delete:hover {
            color: #ff6b6b;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            width: 100%;
        }

        .message.user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message-content {
            background: #2a2a2a;
            padding: 1rem;
            border-radius: 12px;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .message.assistant .message-content {
            background: #3a3a3a;
        }

        .message.error .message-content {
            background: #3a1a1a;
            border: 1px solid #f44336;
        }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid #3a3a3a;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }

        .input-box {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 1rem;
            color: #e0e0e0;
            font-size: 1rem;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 150px;
        }

        .input-box:focus {
            border-color: #4a4a4a;
        }

        .send-btn {
            padding: 0 1.5rem;
            background: #4caf50;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #45a049;
        }

        .send-btn:disabled {
            background: #3a3a3a;
            cursor: not-allowed;
        }

        .typing {
            padding: 0 2rem;
            font-size: 0.9rem;
            color: #888;
        }

        .typing:empty {
            display: none;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Scrollbar styles */
        .sessions::-webkit-scrollbar,
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .sessions::-webkit-scrollbar-track,
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .sessions::-webkit-scrollbar-thumb,
        .messages::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 3px;
        }

        .loading-sessions {
            padding: 1rem;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Marstaff AI Assistant</h1>
        <div class="status">
            <div class="status-dot connecting" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="sessions" id="sessions">
                <div class="loading-sessions">Loading sessions...</div>
            </div>
        </div>

        <div class="chat">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Hello! I'm Marstaff, your AI assistant. How can I help you today?
                    </div>
                </div>
            </div>
            <div class="typing" id="typing"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-box" id="inputBox" placeholder="Type your message..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const WS_URL = `ws://${window.location.hostname}:18789/ws`;
        let ws = null;
        let sessionId = null;
        let userId = null;
        let sessions = [];

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const messagesContainer = document.getElementById('messages');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing');
        const sessionsContainer = document.getElementById('sessions');

        // Initialize
        init();

        async function init() {
            // Generate/get user ID
            userId = localStorage.getItem('marstaff_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('marstaff_user_id', userId);
            }

            // Connect to WebSocket
            connect();

            // Load sessions
            await loadSessions();
        }

        async function loadSessions() {
            try {
                const response = await fetch(`${API_BASE}/api/sessions?user_id=${userId}&platform=web`);
                const data = await response.json();
                sessions = data.sessions || [];
                renderSessions();
            } catch (error) {
                console.error('Failed to load sessions:', error);
                sessionsContainer.innerHTML = '<div class="loading-sessions">Failed to load sessions</div>';
            }
        }

        function renderSessions() {
            if (sessions.length === 0) {
                sessionsContainer.innerHTML = '<div class="loading-sessions">No conversations yet</div>';
                return;
            }

            sessionsContainer.innerHTML = sessions.map(session => `
                <div class="session-item ${session.id === sessionId ? 'active' : ''}" data-id="${session.id}">
                    <span class="session-title">${escapeHtml(session.title || 'Untitled')}</span>
                    <button class="session-delete" onclick="deleteSession(event, '${session.id}')">×</button>
                </div>
            `).join('');

            // Add click listeners
            document.querySelectorAll('.session-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('session-delete')) {
                        loadSession(item.dataset.id);
                    }
                });
            });
        }

        async function loadSession(id) {
            sessionId = id;
            renderSessions();

            try {
                const response = await fetch(`${API_BASE}/api/sessions/${id}`);
                const data = await response.json();

                // Clear and load messages
                messagesContainer.innerHTML = '';

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const role = msg.role === 'user' ? 'user' : 'assistant';
                        addMessage(role, msg.content, false);
                    });
                } else {
                    // Show welcome message for empty sessions
                    messagesContainer.innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">🤖</div>
                            <div class="message-content">
                                Hello! I'm Marstaff, your AI assistant. How can I help you today?
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load session:', error);
            }
        }

        async function deleteSession(event, id) {
            event.stopPropagation();

            if (!confirm('Delete this conversation?')) return;

            try {
                await fetch(`${API_BASE}/api/sessions/${id}`, { method: 'DELETE' });
                sessions = sessions.filter(s => s.id !== id);

                if (sessionId === id) {
                    sessionId = null;
                    messagesContainer.innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">🤖</div>
                            <div class="message-content">
                                Hello! I'm Marstaff, your AI assistant. How can I help you today?
                            </div>
                        </div>
                    `;
                }

                renderSessions();
            } catch (error) {
                console.error('Failed to delete session:', error);
            }
        }

        function connect() {
            ws = new WebSocket(WS_URL + '?user_id=' + userId);

            ws.onopen = () => {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Connected';
                sendBtn.disabled = false;
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Disconnected';
                sendBtn.disabled = true;
                setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                statusDot.className = 'status-dot connecting';
                statusText.textContent = 'Connecting...';
                sendBtn.disabled = true;
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'chat':
                    if (data.data && data.data.content) {
                        addMessage('assistant', data.data.content);
                    }
                    typingIndicator.textContent = '';
                    break;
                case 'typing':
                    typingIndicator.textContent = data.data && data.data.typing ? 'AI is typing...' : '';
                    break;
                case 'error':
                    if (data.data && data.data.error) {
                        addMessage('error', `Error: ${data.data.error}`);
                    }
                    typingIndicator.textContent = '';
                    break;
                case 'status':
                    if (data.data && data.data.client_id) {
                        console.log('Connected as:', data.data.client_id);
                    }
                    break;
            }
        }

        function addMessage(role, content, scroll = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="message-avatar">${getAvatar(role)}</div>
                <div class="message-content">${formatMessage(content)}</div>
            `;
            messagesContainer.appendChild(msgDiv);
            if (scroll) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        function getAvatar(role) {
            switch (role) {
                case 'user': return '👤';
                case 'assistant': return '🤖';
                case 'error': return '⚠️';
                default: return '💬';
            }
        }

        function formatMessage(text) {
            // Basic HTML escaping
            const div = document.createElement('div');
            div.textContent = text;
            let html = div.innerHTML;

            // Convert newlines to <br>
            html = html.replace(/\n/g, '<br>');

            // Convert code blocks
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Convert inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const content = inputBox.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage('user', content);
            inputBox.value = '';
            inputBox.style.height = 'auto';

            const message = {
                type: 'chat',
                user_id: userId,
                data: {
                    content: content
                }
            };

            if (sessionId) {
                message.session_id = sessionId;
            }

            ws.send(JSON.stringify(message));

            // Reload sessions after a delay to get the new session
            setTimeout(() => {
                loadSessions();
            }, 500);
        }

        sendBtn.addEventListener('click', sendMessage);
        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        inputBox.addEventListener('input', () => {
            inputBox.style.height = 'auto';
            inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
        });

        // New chat button
        document.getElementById('newChatBtn').addEventListener('click', () => {
            sessionId = null;
            renderSessions();
            messagesContainer.innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Hello! I'm Marstaff, your AI assistant. How can I help you today?
                    </div>
                </div>
            `;
        });

        // Make deleteSession global
        window.deleteSession = deleteSession;
    </script>
</body>
</html>
