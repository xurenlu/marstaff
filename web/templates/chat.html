            streamingPlaceholder.classList.remove('streaming');
            const toggle = streamingPlaceholder.querySelector('.thinking-toggle');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    streamingPlaceholder.querySelector('.thinking-block').classList.toggle('expanded');
                });
            }
            renderMathAndDiagrams(streamingPlaceholder);
            streamingPlaceholder = null;
        }

        function executePlan(msgElement) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const data = {
                content: '请按照上述计划执行',
                plan_mode: false
            };
            if (appMode === 'programming' && workspacePath) {
                data.work_dir = workspacePath;
            }
            ws.send(JSON.stringify({
                type: 'chat',
                user_id: userId,
                session_id: sessionId,
                data: data
            }));
            showTypingIndicator();
            const btn = msgElement && msgElement.querySelector('.execute-plan-btn');
            if (btn) btn.disabled = true;
        }
        window.executePlan = executePlan;

        function hideTypingIndicator() {
            streamingThinkingBuffer = '';
            streamingContentBuffer = '';
            typingIndicator.innerHTML = '';
            typingIndicator.style.display = '';
        }

        function handleWebSocketMessage(data) {
            // Save current client_id from status message
            if (data.type === 'status' && data.data && data.data.client_id) {
                currentClientId = data.data.client_id;
                console.log('Connected as:', currentClientId);
                return;
            }

            // Generate unique message ID for deduplication
            const messageId = `${data.type}_${data.timestamp || Date.now()}_${JSON.stringify(data.data || '').slice(0, 50)}`;

            // Check if this message was already processed (avoid duplicates from multiple tabs)
            if (processedMessageIds.has(messageId)) {
                return;
            }
            processedMessageIds.add(messageId);

            // Clean up old message IDs (keep last 100)
            if (processedMessageIds.size > 100) {
                const firstId = processedMessageIds.values().next().value;
                processedMessageIds.delete(firstId);
            }

            switch (data.type) {
                case 'chat':
                    const content = data.data && data.data.content;
                    let thinking = data.data && data.data.thinking;
                    const usage = data.data && data.data.usage ? data.data.usage : null;
                    const latency = data.data && data.data.latency ? data.data.latency : null;
                    if (!thinking && streamingThinkingBuffer) {
                        thinking = streamingThinkingBuffer;
                    }
                    if (data.session_id && data.session_id !== sessionId) {
                        sessionId = data.session_id;
                        startWorkflowPolling();
                        loadSessions();
                    }
                    if (streamingPlaceholder) {
                        finalizeStreamingPlaceholder((content && content.trim()) ? content : i18n.noReply, thinking || '', usage, latency);
                    } else {
                        addMessage('assistant', (content && content.trim()) ? content : i18n.noReply, true, [], thinking || '', usage, latency);
                    }
                    hideTypingIndicator();
                    break;
                case 'content':
                    appendContentChunk(data.data && data.data.delta);
                    break;
                case 'thinking':
                    appendThinkingChunk(data.data && data.data.delta);
                    break;
                case 'typing':
                    if (data.data && data.data.typing) {
                        showTypingIndicator();
                    } else {
                        hideTypingIndicator();
                    }
                    break;
                case 'error':
                    if (streamingPlaceholder) {
                        streamingPlaceholder.remove();
                        streamingPlaceholder = null;
                    }
                    if (data.data && data.data.error) {
                        addMessage('error', `Error: ${data.data.error}`);
                    }
                    hideTypingIndicator();
                    break;
                case 'open_search':
                    if (data.data && data.data.url) {
                        // Open Google search in a new tab
                        window.open(data.data.url, '_blank');
                    }
                    break;
                case 'session_title':
                    if (data.session_id && data.data && data.data.title) {
                        if (!sessionId) sessionId = data.session_id;
                        const s = sessions.find(x => x.id === data.session_id);
                        if (s) {
                            s.title = data.data.title;
                            renderSessions();
                        } else {
                            loadSessions();
                        }
                    }
                    break;
                case 'async_task_completed':
                    // Video/image generation completed
                    if (data.data && data.data.task) {
                        const task = data.data.task;
                        const resultUrl = task.result_url;  // URL is inside task object
                        const taskType = task.task_type || 'unknown';  // task_type is inside task object
                        const isFinal = data.data.is_final !== false;
                        const workflowSubtaskKey = task.workflow_subtask_key;

                        console.log('Received task completed:', { task, resultUrl, taskType, isFinal });

                        const taskPrefix = workflowSubtaskKey ? '🎬 分镜完成' : '✅ 任务完成';
                        let messageContent = `${taskPrefix}: ${task.name || 'Async Task'}`;
                        if (!isFinal) {
                            messageContent += `\n\n⏳ 视频正在上传到更快的存储服务器...`;
                        }

                        // Add the media element (video player, image, or file path for command_execution)
                        const mediaHtml = formatMediaResult(resultUrl, taskType, task);

                        addMessageWithHtml('assistant', messageContent, mediaHtml);

                        // Send system notification when task is complete
                        if (isFinal) {
                            const isVideo = taskType === 'video_generation' ||
                                           resultUrl.includes('.mp4') ||
                                           resultUrl.includes('.mov') ||
                                           resultUrl.includes('.webm');
                            const notificationTitle = workflowSubtaskKey ? '🎬 分镜已完成' : (isVideo ? '🎬 视频生成完成' : '✅ 任务完成');
                            const notificationBody = task.name || '您的异步任务已完成';
                            showNotification(notificationTitle, notificationBody, null, () => {
                                // Focus on the chat window when notification is clicked
                                window.focus();
                                // Scroll to the latest message
                                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                            });
                        }
                    }
                    loadWorkflowPanel();
                    hideTypingIndicator();
                    break;
                case 'async_task_url_updated':
                    // Video URL updated after OSS upload
                    if (data.data && data.data.task && data.data.success) {
                        const task = data.data.task;
                        const newUrl = task.result_url;  // URL is inside task object
                        const taskType = task.task_type || 'unknown';  // task_type is inside task object
                        const workflowSubtaskKey = task.workflow_subtask_key;

                        console.log('Received URL update:', { task, newUrl, taskType });

                        // Update the last assistant message with new URL
                        const messages = messagesContainer.querySelectorAll('.message.assistant');
                        if (messages.length > 0) {
                            const lastMsg = messages[messages.length - 1];
                            const contentEl = lastMsg.querySelector('.message-content');

                            // Check if this is the right message (contains uploading text or task name)
                            if (contentEl && (contentEl.textContent.includes('⏳ 视频正在上传') || contentEl.textContent.includes(task.name))) {
                                // Remove the "uploading" indicator
                                const uploadingText = contentEl.querySelector('.uploading-indicator');
                                if (uploadingText) uploadingText.remove();

                                // Update message content and add video player
                                const taskPrefix = workflowSubtaskKey ? '🎬 分镜完成' : '✅ 任务完成';
                                const messageContent = `${taskPrefix}: ${task.name || 'Async Task'}`;
                                const mediaHtml = formatMediaResult(newUrl, taskType, task);

                                // Update content: keep existing content but replace uploading text with final video
                                contentEl.innerHTML = formatMessage(messageContent) + mediaHtml;

                                // Add download link (only for video URLs)
                                const downloadLink = document.createElement('a');
                                downloadLink.href = newUrl;
                                downloadLink.target = '_blank';  // Open in new tab
                                downloadLink.textContent = '📥 下载视频';
                                downloadLink.style.cssText = 'display: inline-block; margin-top: 8px; padding: 8px 16px; background: #4CAF50; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 500;';
                                downloadLink.addEventListener('click', (e) => {
                                    e.preventDefault();
                                    // Create a temporary link to trigger download
                                    const tempLink = document.createElement('a');
                                    tempLink.href = newUrl;
                                    tempLink.download = `video_${Date.now()}.mp4`;
                                    tempLink.target = '_blank';
                                    document.body.appendChild(tempLink);
                                    tempLink.click();
                                    document.body.removeChild(tempLink);
                                });
                                contentEl.appendChild(downloadLink);

                                renderMathAndDiagrams(lastMsg);

                                // Scroll to bottom
                                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                                console.log('Video URL updated successfully:', newUrl);

                                // Send system notification when upload is complete (video is now ready)
                                const isVideo = taskType === 'video_generation' ||
                                               newUrl.includes('.mp4') ||
                                               newUrl.includes('.mov') ||
                                               newUrl.includes('.webm');
                                if (isVideo) {
                                    const notificationTitle = workflowSubtaskKey ? '🎬 分镜视频已准备好' : '🎬 视频已准备好';
                                    showNotification(notificationTitle, '点击查看视频：' + (task.name || ''), null, () => {
                                        window.focus();
                                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                    });
                                }
                            }
                        }
                    }
                    break;
                case 'async_task_upload_failed':
                    // Video upload to OSS failed, but original URL still works
                    if (data.data && data.data.task) {
                        console.log('Video upload to OSS failed, keeping original URL:', data.data.task.result_url);
                    }
                    break;
                case 'async_task_failed':
                    // Video/image generation failed
                    if (data.data && data.data.task) {
                        const task = data.data.task;
                        const errorMsg = task.error_message || 'Unknown error';  // error_message is inside task object
                        addMessage('error', `❌ 任务失败: ${task.name || 'Async Task'}\n\n原因: ${errorMsg}`);
                    }
                    loadWorkflowPanel();
                    hideTypingIndicator();
                    break;
                case 'afk_status_changed':
                    // AFK mode status changed (update UI if needed)
                    if (data.data) {
                        console.log('AFK status changed:', data.data);
                        // Could update UI to show AFK indicator if needed
                    }
                    break;
            }
        }

        function addMessage(role, content, scroll = true, imageUrls = [], thinking = '', usage = null, latency = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            let innerHTML = `<div class="message-avatar">${getAvatar(role)}</div>`;
            innerHTML += `<div class="message-wrapper">`;

            // Add header with regenerate/resend button, copy button, and token display
            if (role === 'assistant') {
                let tokenText = '';
                if (usage && (usage.prompt_tokens > 0 || usage.completion_tokens > 0)) {
                    tokenText = `${i18n.tokensInput} ${usage.prompt_tokens || 0} / ${i18n.tokensOutput} ${usage.completion_tokens || 0} ${i18n.tokensTotal}`;
                }
                if (latency) {
                    if (tokenText) tokenText += ' | ';
                    tokenText += `${i18n.latency} ${latency} ${i18n.seconds}`;
                }
                const tokensHtml = `<span class="message-tokens">${tokenText}</span>`;
                innerHTML += `
                    <div class="message-header">
                        <span class="message-role">Assistant</span>
                        <button class="regenerate-btn" onclick="regenerateResponse()" title="Regenerate response">🔄</button>
                        <button class="copy-message-btn" onclick="copyMessageContent(this.closest('.message'))" title="${i18n.copyMessage}">📋</button>
                        ${tokensHtml}
                    </div>
                `;
            } else if (role === 'user') {
                // Store message data for resend functionality
                const contentData = encodeURIComponent(JSON.stringify({ content, imageUrls: imageUrls || [] }));
                innerHTML += `
                    <div class="message-header">
                        <span class="message-role">You</span>
                        <button class="regenerate-btn" onclick="resendUserMessage(this)" data-content="${contentData}" title="Resend message">🔄</button>
                        <button class="copy-message-btn" onclick="copyMessageContent(this.closest('.message'))" title="${i18n.copyMessage}">📋</button>
                        <span class="message-tokens"></span>
                    </div>
                `;
            }

            let contentHtml = formatMessage(content || '');
            if (imageUrls && imageUrls.length > 0) {
                contentHtml += imageUrls.map(url => `<img src="${escapeHtml(url)}" class="message-image" data-lightbox="true" alt="attached">`).join('');
            }

            // Add collapsible thinking block (collapsed by default when complete)
            if (thinking && role === 'assistant') {
                contentHtml += buildThinkingBlockHtml(thinking, false);
            }

            innerHTML += `<div class="message-content">${contentHtml}</div>`;
            innerHTML += `</div>`;

            msgDiv.innerHTML = innerHTML;
            messagesContainer.appendChild(msgDiv);

            if (role === 'assistant' && lastMessageWasPlanMode) {
                const contentEl = msgDiv.querySelector('.message-content');
                if (contentEl) {
                    const btn = document.createElement('button');
                    btn.className = 'execute-plan-btn';
                    btn.textContent = i18n.executePlan;
                    btn.onclick = () => executePlan(msgDiv);
                    contentEl.appendChild(btn);
                }
            }

            // Bind thinking toggle
            const toggle = msgDiv.querySelector('.thinking-toggle');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    msgDiv.querySelector('.thinking-block').classList.toggle('expanded');
                });
            }

            // Render math and mermaid diagrams
            renderMathAndDiagrams(msgDiv);

            if (scroll) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        // addMessageWithHtml adds a message with additional HTML content (e.g., video player, image)
        function addMessageWithHtml(role, content, extraHtml = '', scroll = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            let innerHTML = `<div class="message-avatar">${getAvatar(role)}</div>`;

                    <div class="message-header">

            innerHTML += `</div>`;

        function buildThinkingBlockHtml(text, expanded = false) {
            const escaped = escapeHtml(text || '');
            return `
                <div class="thinking-block${expanded ? ' expanded' : ''}">
                    <div class="thinking-toggle">
                        <span class="thinking-toggle-icon">▶</span>
                        <span>${expanded ? '思考过程 (点击收起)' : '思考过程 (点击展开)'}</span>
                    </div>
                    <div class="thinking-content">
                        <div class="thinking-inner">${escaped}</div>
                    </div>
                </div>
            `;
        }

        function renderMathAndDiagrams(element) {
            // Render LaTeX math with KaTeX (if loaded)
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(element, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }

            // Render Mermaid diagrams (if loaded)
            if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
                const mermaidDivs = element.querySelectorAll('.mermaid');
                mermaidDivs.forEach(div => {
                    mermaid.run({
                        nodes: [div]
                    }).catch(err => console.warn('Mermaid render error:', err));
                });
            }

            // Add copy buttons to code blocks
            const codeBlocks = element.querySelectorAll('pre > code');
            codeBlocks.forEach(codeBlock => {
                const pre = codeBlock.parentElement;
                // Check if copy button already exists
                if (!pre.querySelector('.code-copy-btn')) {
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'code-copy-btn';
                    copyBtn.innerHTML = '📋 Copy';
                    copyBtn.onclick = () => copyCode(codeBlock, copyBtn);
                    pre.appendChild(copyBtn);
                }
            });
        }

        function copyCode(codeElement, button) {
            const text = codeElement.textContent || codeElement.innerText;

            navigator.clipboard.writeText(text).then(() => {
                // Show copied state
                button.innerHTML = '✓ Copied';
                button.classList.add('copied');

                // Reset after 2 seconds
                setTimeout(() => {
                    button.innerHTML = '📋 Copy';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy code:', err);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    button.innerHTML = '✓ Copied';
                    button.classList.add('copied');
                    setTimeout(() => {
                        button.innerHTML = '📋 Copy';
                        button.classList.remove('copied');
                    }, 2000);
                } catch (e) {
                    button.innerHTML = '✗ Failed';
                }
                document.body.removeChild(textArea);
            });
        }

        function copyMessageContent(msgElement) {
            if (!msgElement) return;
            const contentEl = msgElement.querySelector('.message-content');
            if (!contentEl) return;
            const clone = contentEl.cloneNode(true);
            const thinkingBlock = clone.querySelector('.thinking-block');
            if (thinkingBlock) thinkingBlock.remove();
            const executeBtn = clone.querySelector('.execute-plan-btn');
            if (executeBtn) executeBtn.remove();
            const text = clone.innerText || clone.textContent || '';
            const copyBtn = msgElement.querySelector('.copy-message-btn');
            if (!copyBtn) return;

            const showResult = (success) => {
                copyBtn.textContent = success ? i18n.copySuccess : i18n.copyFailed;
                copyBtn.classList.toggle('copied', success);
                copyBtn.classList.toggle('failed', !success);
                setTimeout(() => {
                    copyBtn.innerHTML = '📋';
                    copyBtn.classList.remove('copied', 'failed');
                }, 2000);
            };

            navigator.clipboard.writeText(text).then(() => {
                showResult(true);
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    const ok = document.execCommand('copy');
                    showResult(ok);
                } catch (e) {
                    showResult(false);
                }
                document.body.removeChild(textArea);
            });
        }
        window.copyMessageContent = copyMessageContent;

        function getAvatar(role) {
            switch (role) {
                case 'user': return '👤';
                case 'assistant': return '🤖';
                case 'error': return '⚠️';
                default: return '💬';
            }
        }

        function formatMessage(text) {
            // Parse markdown with marked
            try {
                let html = marked.parse(text);
                // Add data-lightbox attribute to all images for click-to-enlarge
                html = html.replace(/<img([^>]*)>/g, '<img$1 data-lightbox="true">');
                return html;
            } catch (e) {
                console.error('Markdown parse error:', e);
                // Fallback to basic formatting
                const div = document.createElement('div');
                div.textContent = text;
                let html = div.innerHTML;
                html = html.replace(/\n/g, '<br>');
                return html;
            }
        }

        // formatMediaResult formats a media result (video/image/file) based on task type.
        // For command_execution (firecrawl, web scraping, etc.), result is a file - do NOT render as video/image.
        function formatMediaResult(url, taskType, task) {
            // Check if URL is valid
            if (!url || url.trim() === '') {
                return '<div style="color: #888; font-style: italic; margin-top: 8px;">加载中...</div>';
            }

            const asyncTaskType = task?.trigger_config?.async_task_config?.task_type;
            // URL path without query string (OSS URLs often have ?Expires=...&Signature=...)
            const urlPath = url.split('?')[0];

            // command_execution / oneoff tasks: result is a file (log, json, csv, md, txt) - never render as video
            const hasFileExt = /\.(log|json|csv|md|txt)$/i.test(urlPath);
            const isLocalPath = !url.startsWith('http://') && !url.startsWith('https://') && (url.includes('/') || url.includes('\\\\'));
            const hasVideoExt = /\.(mp4|mov|webm|gif)$/i.test(urlPath);
            const isFileResult = asyncTaskType === 'command_execution' ||
                hasFileExt ||
                isLocalPath ||
                // Oneoff tasks use task_type "async"; when trigger_config may be missing, treat as file if not clearly video
                (taskType === 'async' && asyncTaskType !== 'video_generation' && !hasVideoExt);

            if (isFileResult) {
                const isHttpUrl = url.startsWith('http://') || url.startsWith('https://');
                return `<div style="margin-top: 8px; padding: 12px; background: var(--bg-secondary, #2a2a2a); border-radius: 8px; font-size: 13px; color: var(--text-secondary, #aaa);">
                    <div style="margin-bottom: 6px;">📄 结果已保存${isHttpUrl ? '并上传' : ''}</div>
                    ${isHttpUrl ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="color: var(--accent, #4CAF50); word-break: break-all;">${escapeHtml(url)}</a>` : `<code style="word-break: break-all; font-size: 12px;">${escapeHtml(url)}</code>`}
                    <div style="margin-top: 8px; font-size: 12px;">${isHttpUrl ? '点击链接下载查看，或' : '可在终端查看，或'}前往 <a href="/afk" target="_blank" style="color: var(--accent, #4CAF50);">/afk</a> 页面查看任务详情。</div>
                </div>`;
            }

            // Determine if it's a video (by task type or URL extension)
            const isVideo = taskType === 'video_generation' ||
                           asyncTaskType === 'video_generation' ||
                           hasVideoExt;

            if (isVideo) {
                return `<video src="${escapeHtml(url)}" controls style="max-width: 600px; max-height: 300px; width: auto; border-radius: 8px; margin-top: 8px;" onerror="this.parentElement.innerHTML='<div style=\\'color: #e74c3c; margin-top: 8px;\\'>视频加载失败，URL 可能无效</div>'"></video>
                    <a href="${escapeHtml(url)}" target="_blank" style="display: inline-block; margin-top: 8px; padding: 8px 16px; background: #4CAF50; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 500;">📥 下载视频</a>`;
            } else {
                return `<img src="${escapeHtml(url)}" style="max-width: 600px; max-height: 300px; width: auto; height: auto; border-radius: 8px; margin-top: 8px; cursor: pointer;" data-lightbox="true" alt="Generated result" onerror="this.style.display='none'; this.parentElement.innerHTML+='<div style=\\'color: #e74c3c; margin-top: 8px;\\'>图片加载失败</div>'">`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const content = inputBox.value.trim();
            if ((!content && pendingImages.length === 0) || !ws || ws.readyState !== WebSocket.OPEN) return;

            const displayContent = content || '(Image attached)';
            const imagesToShow = [...pendingImages];

            // Store for regeneration
            lastUserMessage = content;
            lastContentParts = pendingImages.length > 0 ? [
                ...(content ? [{ type: 'text', text: content }] : []),
                ...pendingImages.map(url => ({ type: 'image_url', image_url: { url: url } }))
            ] : null;

            addMessage('user', displayContent, true, imagesToShow);
            inputBox.value = '';
            inputBox.style.height = 'auto';

            const data = { content: content || '' };
            if (pendingImages.length > 0) {
                data.content_parts = [
                    ...(content ? [{ type: 'text', text: content }] : []),
                    ...pendingImages.map(url => ({ type: 'image_url', image_url: { url: url } }))
                ];
            }
            const visionProvider = localStorage.getItem('marstaff_vision_provider') || 'qwen';
            data.vision_provider = visionProvider;
            const chatProvider = localStorage.getItem('marstaff_chat_provider') || 'zai';
            data.provider = chatProvider;
            data.plan_mode = planMode;
            if (appMode === 'programming' && workspacePath) {
                data.work_dir = workspacePath;
            }
            lastMessageWasPlanMode = planMode;

            const message = {
                type: 'chat',
                user_id: userId,
                data: data
            };

            if (sessionId) {
                message.session_id = sessionId;
            }

            ws.send(JSON.stringify(message));
            pendingImages = [];
            renderImagePreview();

            // 立即显示等待反馈，给用户一点安慰
            showTypingIndicator();
        }

        function regenerateResponse() {
            if (!ws || ws.readyState !== WebSocket.OPEN || !lastUserMessage) return;

            // Disable regenerate button
            const regenBtns = document.querySelectorAll('.regenerate-btn');
            regenBtns.forEach(btn => btn.disabled = true);

            showTypingIndicator('Regenerating...');

            const data = { content: lastUserMessage || '' };
            if (lastContentParts) {
                data.content_parts = lastContentParts;
            }
            data.vision_provider = localStorage.getItem('marstaff_vision_provider') || 'qwen';
            const chatProvider = localStorage.getItem('marstaff_chat_provider') || 'zai';
            data.provider = chatProvider;
            data.plan_mode = planMode;
            if (appMode === 'programming' && workspacePath) {
                data.work_dir = workspacePath;
            }
            lastMessageWasPlanMode = planMode;

            const message = {
                type: 'chat',
                user_id: userId,
                data: data
            };

            if (sessionId) {
                message.session_id = sessionId;
            }

            ws.send(JSON.stringify(message));

            // Re-enable buttons after a delay
            setTimeout(() => {
                regenBtns.forEach(btn => btn.disabled = false);
            }, 3000);
        }
        window.regenerateResponse = regenerateResponse;

        // Resend a user message (removes all messages after it)
        function resendUserMessage(button) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            // Get the message data from the button
            const contentDataRaw = button.getAttribute('data-content');
            if (!contentDataRaw) return;

            let contentData;
            try {
                contentData = JSON.parse(decodeURIComponent(contentDataRaw));
            } catch (e) {
                console.error('Failed to parse message data:', e);
                return;
            }

            const content = contentData.content || '';
            const imageUrls = contentData.imageUrls || [];

            // Find the user message element
            const userMsgDiv = button.closest('.message.user');
            if (!userMsgDiv) return;

            // Remove all messages after this user message
            let currentMsg = userMsgDiv.nextElementSibling;
            while (currentMsg) {
                const nextMsg = currentMsg.nextElementSibling;
                currentMsg.remove();
                currentMsg = nextMsg;
            }

            // Disable all regenerate buttons during resend
            const regenBtns = document.querySelectorAll('.regenerate-btn');
            regenBtns.forEach(btn => btn.disabled = true);

            showTypingIndicator('Resending...');

            // Prepare message data
            const data = { content: content || '' };
            if (imageUrls && imageUrls.length > 0) {
                data.content_parts = [
                    ...(content ? [{ type: 'text', text: content }] : []),
                    ...imageUrls.map(url => ({ type: 'image_url', image_url: { url: url } }))
                ];
            }
            data.vision_provider = localStorage.getItem('marstaff_vision_provider') || 'qwen';
            const chatProvider = localStorage.getItem('marstaff_chat_provider') || 'zai';
            data.provider = chatProvider;
            data.plan_mode = planMode;
            if (appMode === 'programming' && workspacePath) {
                data.work_dir = workspacePath;
            }
            lastMessageWasPlanMode = planMode;

            // Update lastUserMessage and lastContentParts for potential future regenerate
            lastUserMessage = content;
            lastContentParts = imageUrls && imageUrls.length > 0 ? data.content_parts : null;

            const message = {
                type: 'chat',
                user_id: userId,
                data: data
            };

            if (sessionId) {
                message.session_id = sessionId;
            }

            ws.send(JSON.stringify(message));

            // Re-enable buttons after a delay
            setTimeout(() => {
                regenBtns.forEach(btn => btn.disabled = false);
            }, 3000);
        }
        window.resendUserMessage = resendUserMessage;

        function renderImagePreview() {
            const el = document.getElementById('imagePreview');
            el.innerHTML = pendingImages.map((url, i) => `
                <div class="image-preview-item">
                    <img src="${url}" alt="preview">
                    <button class="image-preview-remove" onclick="removePendingImage(${i})">×</button>
                </div>
            `).join('');
        }

        function removePendingImage(index) {
            pendingImages.splice(index, 1);
            renderImagePreview();
        }
        window.removePendingImage = removePendingImage;

        async function addPendingImageFromFile(file) {
            if (pendingImages.length >= 4) return;
            try {
                const formData = new FormData();
                formData.append('file', file, file.name || 'image.png');
                const res = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    if (data.url) {
                        pendingImages.push(data.url);
                        renderImagePreview();
                        return;
                    }
                }
                const errData = await res.json().catch(() => ({}));
                alert(errData.error || '图片上传失败，请检查 OSS 配置');
            } catch (e) {
                alert('图片上传失败：' + (e.message || '网络错误'));
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        document.getElementById('attachBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                addPendingImageFromFile(file);
            }
            e.target.value = '';
        });
        inputBox.addEventListener('paste', (e) => {
            const item = e.clipboardData && e.clipboardData.items && [...e.clipboardData.items].find(x => x.type.startsWith('image/'));
            if (item) {
                e.preventDefault();
                const file = item.getAsFile();
                if (file) addPendingImageFromFile(file);
            }
        });

        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        inputBox.addEventListener('input', () => {
            inputBox.style.height = 'auto';
            inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
        });

        // New chat button
        document.getElementById('newChatBtn').addEventListener('click', () => {
            sessionId = null;
            stopWorkflowPolling();
            renderWorkflowPanel([]);
            lastUserMessage = null;
            lastContentParts = null;
            renderSessions();
            messagesContainer.innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>

        async function loadTokenStats() {
            const timeRange = document.getElementById('tokenTimeRange').value;
            const grouping = document.getElementById('tokenGrouping').value;
            const provider = document.getElementById('tokenProvider').value;
            const model = document.getElementById('tokenModel').value;

            // Calculate time range
            const now = new Date();
            let startTime;
            switch(timeRange) {
                case 'today':
                    startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    break;
                case 'week':
                    startTime = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    break;
                case 'month':
                    startTime = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                    break;
                default:
                    startTime = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            }

            const endTime = now;

            // Load total stats
            try {
                const totalParams = new URLSearchParams({
                    start_time: startTime.toISOString(),
                    end_time: endTime.toISOString()
                });
                if (provider) totalParams.append('provider', provider);
                if (model) totalParams.append('model', model);

                const totalRes = await fetch(`/api/token/stats/total?${totalParams}`);
                if (totalRes.ok) {
                    const totalData = await totalRes.json();
                    document.getElementById('totalTokens').textContent = formatNumber(totalData.total_tokens || 0);
                    document.getElementById('promptTokens').textContent = formatNumber(totalData.prompt_tokens || 0);
                    document.getElementById('completionTokens').textContent = formatNumber(totalData.completion_tokens || 0);
                    document.getElementById('estimatedCost').textContent = '$' + (totalData.estimated_cost || 0).toFixed(4);
                    document.getElementById('callCount').textContent = formatNumber(totalData.call_count || 0);
                }
            } catch (e) {
                console.error('Failed to load total stats:', e);
            }

            // Load time series stats for chart - DISABLED due to SQL compatibility issues
            // try {
            //     const statsParams = new URLSearchParams({
            //         start_time: startTime.toISOString(),

            //     if (provider) statsParams.append('provider', provider);
            //     if (model) statsParams.append('model', model);
            //
            //     const statsRes = await fetch(`/api/token/stats?${statsParams}`);
            //     if (statsRes.ok) {
            //         const statsData = await statsRes.json();
            //         renderTokenChart(statsData.stats || []);
            //     }
            // } catch (e) {
            //     console.error('Failed to load stats:', e);
            // }

                const providerParams = new URLSearchParams({
                    start_time: startTime.toISOString(),
                    end_time: endTime.toISOString()

                if (provider) providerParams.append('provider', provider);
                if (model) providerParams.append('model', model);

                const providerRes = await fetch(`/api/token/stats/by-provider?${providerParams}`);
                if (providerRes.ok) {
                    const providerData = await providerRes.json();
                    renderByProviderTable(providerData.stats || []);
                }
            } catch (e) {
                console.error('Failed to load provider stats:', e);

                    end_time: endTime.toISOString()
                });
                if (provider) modelParams.append('provider', provider);
                if (model) modelParams.append('model', model);

                const modelRes = await fetch(`/api/token/stats/by-model?${modelParams}`);
                if (modelRes.ok) {
                    const modelData = await modelRes.json();
                    renderByModelTable(modelData.stats || []);
                }
            } catch (e) {
                console.error('Failed to load model stats:', e);
            }

            // Load recent records
            try {
                const recentParams = new URLSearchParams({ limit: 50 });
                if (provider) recentParams.append('provider', provider);
                if (model) recentParams.append('model', model);

                const recentRes = await fetch(`/api/token/recent?${recentParams}`);
                if (recentRes.ok) {

        function renderTokenChart(stats) {
            const canvas = document.getElementById('tokenChart');
            const ctx = canvas.getContext('2d');

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (stats.length === 0) {
                canvas.innerHTML = '<div class="chart-placeholder">暂无数据</div>';
                return;
            }

            // Group data by date and aggregate
            const aggregated = {};
            stats.forEach(s => {
                if (!aggregated[s.date]) {
                    aggregated[s.date] = { prompt: 0, completion: 0, total: 0 };
                }
                aggregated[s.date].prompt += s.prompt_tokens;
                aggregated[s.date].completion += s.completion_tokens;
                aggregated[s.date].total += s.total_tokens;
            });

            const labels = Object.keys(aggregated).sort();
            const promptData = labels.map(l => aggregated[l].prompt);
            const completionData = labels.map(l => aggregated[l].completion);
            const totalData = labels.map(l => aggregated[l].total);

            // Find max value for scaling
            const maxValue = Math.max(...totalData, 1);

            // Draw chart
            const padding = 40;
            const chartWidth = canvas.width - padding * 2;
            const chartHeight = canvas.height - padding * 2;
            const barWidth = chartWidth / labels.length / 3;

            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-primary').trim() || '#e0e0e0';
            ctx.font = '12px sans-serif';

            // Draw bars
            labels.forEach((label, i) => {
                const x = padding + i * (chartWidth / labels.length);
                const promptHeight = (promptData[i] / maxValue) * chartHeight;
                const completionHeight = (completionData[i] / maxValue) * chartHeight;

                // Draw prompt bar (blue)
                ctx.fillStyle = '#4a9eff';
                ctx.fillRect(x, padding + chartHeight - promptHeight, barWidth - 2, promptHeight);

                // Draw completion bar (green)
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(x + barWidth, padding + chartHeight - completionHeight, barWidth - 2, completionHeight);

                // Draw label (skip some if too many)
                if (labels.length <= 20 || i % Math.ceil(labels.length / 20) === 0) {
                    ctx.save();
                    ctx.translate(x + barWidth, padding + chartHeight + 15);
                    ctx.rotate(-Math.PI / 4);
                    ctx.textAlign = 'right';
                    ctx.fillText(label.substring(5), 0, 0);
                    ctx.restore();
                }
            });

            // Draw legend
            ctx.fillStyle = '#4a9eff';
            ctx.fillRect(padding, 10, 15, 15);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-primary').trim() || '#e0e0e0';
            ctx.fillText('输入Token', padding + 20, 22);

            ctx.fillStyle = '#4caf50';
            ctx.fillRect(padding + 100, 10, 15, 15);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-primary').trim() || '#e0e0e0';
            ctx.fillText('输出Token', padding + 120, 22);
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toLocaleString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Image modal functions
        window.openImageModal = function(imageUrl) {
            console.log('openImageModal called:', imageUrl);
            const modal = document.createElement('div');
            modal.className = 'image-modal';

            // Close on background click, close button click, or image click
            modal.onclick = function(e) {
                if (e.target === modal || e.target.classList.contains('image-modal-close') || e.target.tagName === 'IMG') {
                    modal.remove();
                }
            };
            document.body.appendChild(modal);
        };
        console.log('openImageModal function loaded');

        // Event delegation for clickable images - use capture phase to catch clicks earlier
        document.addEventListener('click', function(e) {
            console.log('Click detected:', e.target.tagName, e.target.className, e.target.hasAttribute('data-lightbox'));
            // Check if clicked element is an image or contains an image
            let img = e.target;
            if (img.tagName !== 'IMG') {
                img = e.target.closest('img');
            }
            if (img && (img.classList.contains('message-image') || img.hasAttribute('data-lightbox'))) {
                const url = img.getAttribute('src') || img.getAttribute('data-src');
                console.log('Image clicked, URL:', url);
                if (url) {
                    e.preventDefault();
                    e.stopPropagation();
                    openImageModal(url);
                }
            }
        }, true); // Use capture phase
