<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - Marstaff</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --bg-tertiary: #3a3a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #3a3a3a;
            --success-color: #4caf50;
        }
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --border-color: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .back-link:hover {
            color: var(--text-primary);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .section-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .option-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .option-row:last-child {
            border-bottom: none;
        }
        .option-row input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--success-color);
        }
        .option-row label {
            flex: 1;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .option-row .hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .save-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .save-btn:hover {
            opacity: 0.9;
        }
        .saved {
            font-size: 0.85rem;
            color: var(--success-color);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回对话</a>
        <h1>设置</h1>

        <div class="section">
            <div class="section-title">图片识别模型</div>
            <div class="section-desc">当消息包含图片时，选择使用哪种模型进行识别：</div>
            <div class="option-row">
                <input type="radio" name="vision_provider" id="vision_qwen" value="qwen">
                <label for="vision_qwen">
                    <strong>Qwen 系列</strong> (qwen-vl-max)
                    <div class="hint">阿里通义千问视觉模型</div>
                </label>
            </div>
            <div class="option-row">
                <input type="radio" name="vision_provider" id="vision_zai" value="zai">
                <label for="vision_zai">
                    <strong>Z.ai 系列</strong> (glm-4v-plus)
                    <div class="hint">智谱 GLM 视觉模型</div>
                </label>
            </div>
            <button class="save-btn" id="saveBtn">保存</button>
            <div class="saved" id="savedHint" style="display:none">已保存</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Load saved theme
        const savedTheme = localStorage.getItem('marstaff_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Load saved preference
        const saved = localStorage.getItem('marstaff_vision_provider') || 'qwen';
        document.querySelector(`input[name="vision_provider"][value="${saved}"]`).checked = true;

        // Load available options from API
        fetch(`${API_BASE}/api/settings?t=${Date.now()}`)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (data && data.vision_providers) {
                    const providers = data.vision_providers;
                    const qwenEl = document.getElementById('vision_qwen');
                    const zaiEl = document.getElementById('vision_zai');
                    if (!providers.includes('qwen')) qwenEl?.closest('.option-row')?.remove();
                    if (!providers.includes('zai')) zaiEl?.closest('.option-row')?.remove();
                }
            })
            .catch(() => {});

        document.getElementById('saveBtn').addEventListener('click', () => {
            const val = document.querySelector('input[name="vision_provider"]:checked')?.value || 'qwen';
            localStorage.setItem('marstaff_vision_provider', val);
            const hint = document.getElementById('savedHint');
            hint.style.display = 'block';
            setTimeout(() => { hint.style.display = 'none'; }, 2000);
        });
    </script>
</body>
</html>
